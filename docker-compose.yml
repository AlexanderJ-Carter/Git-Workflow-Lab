services:
  # ============================================
  # 教程网站 - Nginx 静态网站
  # ============================================
  web:
    image: nginx:alpine
    container_name: git-playground-web
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./site:/usr/share/nginx/html
      - ./docs:/usr/share/nginx/html/docs:ro
    depends_on:
      - gitea
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Gitea - Git 托管平台（预配置镜像）
  # ============================================
  gitea:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: git-playground-gitea
    restart: always
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=db:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=${GITEA_DB_PASSWORD}
      - GITEA__server__ROOT_URL=${PUBLIC_GITEA_URL:-http://localhost:3000/}
      - GITEA__server__DOMAIN=${GITEA_DOMAIN:-localhost}
      - GITEA__server__SSH_DOMAIN=${GITEA_SSH_DOMAIN:-localhost}
      - GITEA__server__SSH_PORT=${GITEA_SSH_PORT:-2222}
      - GITEA__server__START_SSH_SERVER=false
      - GITEA__server__DISABLE_SSH=false
      - GITEA__security__FRAME_ANCESTORS=${PUBLIC_DOCS_ORIGIN:-http://localhost:8081}
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__security__SECRET_KEY=${GITEA_SECRET_KEY}
      - GITEA_ADMIN_USER=${GITEA_ADMIN_USER:-playground}
      - GITEA_ADMIN_PASSWORD=${GITEA_ADMIN_PASSWORD}
      - GITEA_ADMIN_EMAIL=${GITEA_ADMIN_EMAIL:-playground@example.com}
    volumes:
      - gitea-data:/data
      - ./scripts/init-gitea.sh:/docker-entrypoint-init.d/init-gitea.sh:ro
    ports:
      - "3000:3000"
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  # ============================================
  # Web 终端 - ttyd (轻量版)
  # ============================================
  terminal:
    build:
      context: ./docker/terminal
      dockerfile: Dockerfile
    container_name: git-playground-terminal
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - terminal-home:/home/playground
    environment:
      - TERM=xterm-256color
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # PostgreSQL - Gitea 数据库
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: git-playground-db
    restart: always
    environment:
      - POSTGRES_DB=gitea
      - POSTGRES_USER=gitea
      - POSTGRES_PASSWORD=${GITEA_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitea -d gitea"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================
# 数据卷
# ============================================
volumes:
  terminal-home:
    name: git-playground-terminal-home
  gitea-data:
    name: git-workflow-lab-gitea-data
  postgres-data:
    name: git-workflow-lab-postgres-data

# ============================================
# 网络
# ============================================
networks:
  default:
    name: git-playground-net
