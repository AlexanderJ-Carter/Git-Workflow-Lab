{# Language switcher template #}
<div class="language-switcher" style="margin: 10px 0; padding: 10px; background: var(--bg-secondary, #f5f5f5); border-radius: 4px;">
    <span style="font-weight: 500;">🌐 Language / 语言:</span>
    {% if language == 'en' %}
        <strong style="margin-left: 10px;">English</strong>
        <span style="margin: 0 5px;">|</span>
        <a href="../index.html" style="color: var(--primary-color, #4a90e2);">中文</a>
    {% else %}
        <a href="en/index.html" style="color: var(--primary-color, #4a90e2);">English</a>
        <span style="margin: 0 5px;">|</span>
        <strong style="margin-left: 10px;">中文</strong>
    {% endif %}
</div>
