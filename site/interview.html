<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git 面试题库 - Git Workflow Lab</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --interview-primary: #6366f1;
            --interview-secondary: #8b5cf6;
            --interview-success: #10b981;
            --interview-warning: #f59e0b;
            --interview-danger: #ef4444;
            --interview-bg: #f8fafc;
            --interview-bg-card: #ffffff;
            --interview-border: #e2e8f0;
            --interview-text: #1e293b;
            --interview-text-muted: #64748b;
            --interview-radius: 12px;
            --sidebar-width: 260px;
        }

        [data-theme="dark"] {
            --interview-bg: #0f172a;
            --interview-bg-card: #1e293b;
            --interview-border: #334155;
            --interview-text: #f1f5f9;
            --interview-text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            background: var(--interview-bg);
            color: var(--interview-text);
            line-height: 1.7;
            min-height: 100vh;
        }

        .interview-layout {
            display: flex;
            min-height: 100vh;
        }

        /* 左侧导航 */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--interview-bg-card);
            border-right: 1px solid var(--interview-border);
            padding: 24px 0;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            padding: 0 24px 24px;
            border-bottom: 1px solid var(--interview-border);
            margin-bottom: 16px;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
            color: var(--interview-primary);
            text-decoration: none;
        }

        .sidebar-logo svg {
            width: 28px;
            height: 28px;
        }

        .sidebar-subtitle {
            font-size: 12px;
            color: var(--interview-text-muted);
            margin-top: 4px;
        }

        .nav-section {
            padding: 8px 12px;
        }

        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--interview-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 8px 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 8px;
            color: var(--interview-text);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-item:hover {
            background: var(--interview-primary);
            color: white;
        }

        .nav-item.active {
            background: var(--interview-primary);
            color: white;
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .nav-badge {
            margin-left: auto;
            background: var(--interview-border);
            color: var(--interview-text-muted);
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .nav-item:hover .nav-badge,
        .nav-item.active .nav-badge {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .nav-divider {
            height: 1px;
            background: var(--interview-border);
            margin: 12px 24px;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 32px 40px;
            max-width: calc(100% - var(--sidebar-width));
        }

        /* 顶部搜索栏 */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 280px;
            position: relative;
        }

        .search-box svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--interview-text-muted);
        }

        .search-box input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid var(--interview-border);
            border-radius: 12px;
            font-size: 15px;
            background: var(--interview-bg-card);
            color: var(--interview-text);
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--interview-primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .search-box input::placeholder {
            color: var(--interview-text-muted);
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 20px;
            border: 2px solid var(--interview-border);
            border-radius: 12px;
            background: var(--interview-bg-card);
            color: var(--interview-text);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            border-color: var(--interview-primary);
            color: var(--interview-primary);
        }

        .action-btn.active {
            background: var(--interview-primary);
            border-color: var(--interview-primary);
            color: white;
        }

        .action-btn svg {
            width: 18px;
            height: 18px;
        }

        /* 统计信息 */
        .stats-bar {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            padding: 16px 24px;
            background: var(--interview-bg-card);
            border-radius: 12px;
            border: 1px solid var(--interview-border);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: var(--interview-primary);
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-label {
            font-size: 13px;
            color: var(--interview-text-muted);
        }

        /* 分类标题 */
        .category-section {
            margin-bottom: 32px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--interview-border);
        }

        .category-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--interview-primary);
            color: white;
            border-radius: 10px;
            font-size: 20px;
        }

        .category-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--interview-text);
        }

        /* 题目卡片 */
        .question-card {
            background: var(--interview-bg-card);
            border: 1px solid var(--interview-border);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .question-card:hover {
            border-color: var(--interview-primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
        }

        .question-card.favorited {
            border-left: 4px solid var(--interview-warning);
        }

        .question-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 20px;
            cursor: pointer;
        }

        .question-number {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--interview-primary);
            color: white;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .question-content {
            flex: 1;
        }

        .question-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--interview-text);
            line-height: 1.5;
        }

        .question-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .difficulty-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .difficulty-tag.easy {
            background: #d1fae5;
            color: #065f46;
        }

        .difficulty-tag.medium {
            background: #fef3c7;
            color: #92400e;
        }

        .difficulty-tag.hard {
            background: #fee2e2;
            color: #991b1b;
        }

        [data-theme="dark"] .difficulty-tag.easy {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        [data-theme="dark"] .difficulty-tag.medium {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        [data-theme="dark"] .difficulty-tag.hard {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .favorite-btn {
            padding: 6px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--interview-text-muted);
            border-radius: 6px;
            transition: all 0.2s;
            margin-left: auto;
        }

        .favorite-btn:hover {
            background: var(--interview-border);
            color: var(--interview-warning);
        }

        .favorite-btn.active {
            color: var(--interview-warning);
        }

        .favorite-btn svg {
            width: 20px;
            height: 20px;
        }

        .toggle-icon {
            width: 24px;
            height: 24px;
            color: var(--interview-text-muted);
            transition: transform 0.3s;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .question-card.expanded .toggle-icon {
            transform: rotate(180deg);
        }

        /* 答案区域 */
        .answer-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .question-card.expanded .answer-section {
            max-height: 2000px;
        }

        .answer-content {
            padding: 0 20px 20px 64px;
        }

        .answer-text {
            color: var(--interview-text);
            font-size: 15px;
            line-height: 1.8;
        }

        .answer-text h4 {
            font-size: 15px;
            font-weight: 600;
            margin: 16px 0 8px;
            color: var(--interview-primary);
        }

        .answer-text h4:first-child {
            margin-top: 0;
        }

        .answer-text ul,
        .answer-text ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .answer-text li {
            margin-bottom: 6px;
        }

        .answer-text code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--interview-border);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .answer-text pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .answer-text pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        .answer-text .highlight {
            background: rgba(99, 102, 241, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* 随机抽题模式 */
        .practice-mode {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--interview-bg);
            z-index: 200;
            overflow-y: auto;
        }

        .practice-mode.active {
            display: block;
        }

        .practice-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            background: var(--interview-bg-card);
            border-bottom: 1px solid var(--interview-border);
            position: sticky;
            top: 0;
        }

        .practice-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--interview-primary);
        }

        .practice-close {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: none;
            border: 2px solid var(--interview-border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--interview-text);
            transition: all 0.2s;
        }

        .practice-close:hover {
            background: var(--interview-danger);
            border-color: var(--interview-danger);
            color: white;
        }

        .practice-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
        }

        .practice-question {
            background: var(--interview-bg-card);
            border: 1px solid var(--interview-border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .practice-question-text {
            font-size: 22px;
            font-weight: 700;
            color: var(--interview-text);
            margin-bottom: 16px;
        }

        .practice-question-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .practice-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .practice-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .practice-btn.primary {
            background: var(--interview-primary);
            color: white;
            border: none;
        }

        .practice-btn.primary:hover {
            background: var(--interview-secondary);
        }

        .practice-btn.secondary {
            background: var(--interview-bg-card);
            color: var(--interview-text);
            border: 2px solid var(--interview-border);
        }

        .practice-btn.secondary:hover {
            border-color: var(--interview-primary);
            color: var(--interview-primary);
        }

        .practice-answer {
            display: none;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--interview-border);
        }

        .practice-answer.show {
            display: block;
        }

        .practice-answer-text {
            font-size: 16px;
            line-height: 1.8;
            color: var(--interview-text);
        }

        .practice-stats {
            text-align: center;
            color: var(--interview-text-muted);
            font-size: 14px;
            margin-top: 16px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--interview-text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 16px;
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                max-width: 100%;
                padding: 20px;
            }

            .mobile-menu-btn {
                display: flex;
            }

            .stats-bar {
                flex-wrap: wrap;
            }

            .answer-content {
                padding-left: 20px;
            }
        }

        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 150;
            padding: 10px;
            background: var(--interview-bg-card);
            border: 1px solid var(--interview-border);
            border-radius: 8px;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            .mobile-menu-btn {
                display: flex;
            }
        }

        .mobile-menu-btn svg {
            width: 24px;
            height: 24px;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 90;
        }

        @media (max-width: 900px) {
            .sidebar-overlay.show {
                display: block;
            }
        }
    </style>
</head>
<body>
    <!-- 移动端菜单按钮 -->
    <button class="mobile-menu-btn" id="mobileMenuBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="interview-layout">
        <!-- 左侧导航 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="./index.html" class="sidebar-logo">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    Git 面试题库
                </a>
                <div class="sidebar-subtitle">Interview Questions</div>
            </div>

            <nav>
                <div class="nav-section">
                    <div class="nav-section-title">分类</div>
                    <a class="nav-item active" data-category="all">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        全部题目
                        <span class="nav-badge" id="totalCount">0</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">基础</div>
                    <a class="nav-item" data-category="basic">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 16v-4"></path>
                            <path d="M12 8h.01"></path>
                        </svg>
                        基础概念
                        <span class="nav-badge" id="basicCount">0</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">进阶</div>
                    <a class="nav-item" data-category="branch">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="6" y1="3" x2="6" y2="15"></line>
                            <circle cx="18" cy="6" r="3"></circle>
                            <circle cx="6" cy="18" r="3"></circle>
                            <path d="M18 9a9 9 0 0 1-9 9"></path>
                        </svg>
                        分支操作
                        <span class="nav-badge" id="branchCount">0</span>
                    </a>
                    <a class="nav-item" data-category="undo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 7v6h6"></path>
                            <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
                        </svg>
                        撤销操作
                        <span class="nav-badge" id="undoCount">0</span>
                    </a>
                    <a class="nav-item" data-category="advanced">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                            <polyline points="2 17 12 22 22 17"></polyline>
                            <polyline points="2 12 12 17 22 12"></polyline>
                        </svg>
                        进阶问题
                        <span class="nav-badge" id="advancedCount">0</span>
                    </a>
                </div>

                <div class="nav-divider"></div>

                <div class="nav-section">
                    <a class="nav-item" data-category="favorites">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                        </svg>
                        我的收藏
                        <span class="nav-badge" id="favoritesCount">0</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 搜索栏 -->
            <div class="top-bar">
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索题目或答案...">
                </div>
                <button class="action-btn" id="practiceModeBtn">

<p>Git 是一个分布式版本控制系统，由 Linus Torvalds 于 2005 年创建。最初是为了管理 Linux 内核开发而设计的，现在已成为最流行的版本控制系统。</p>

<li><strong>已修改（Modified）</strong>：修改了文件但还没有保存到数据库中</li>

<h4>暂存区（Staging Area / Index）</h4>
<p>暂存区是一个文件（位于 .git/index），保存了下次将要提交的文件列表信息。有时候也被称为"索引"。</p>

<h4>本地仓库（Local Repository）</h4>
<p>本地仓库是 Git 用来保存项目的元数据和对象数据库的地方。可以理解为 .git 目录，它是 Git 的核心。</p>

<pre><code>工作区 → git add → 暂存区 → git commit → 本地仓库

<h4>详细流程</h4>

<li><strong>git commit</strong>：将暂存区的所有内容提交到本地仓库（创建新的提交对象）</li>
<li><strong>git checkout / git restore</strong>：从本地仓库或暂存区恢复文件到工作区</li>
<li><strong>git reset</strong>：可以移动暂存区的内容回退到工作区，或将仓库的提交回退</li>
</ol>

<p><span class="highlight">理解这三个区域的关系是掌握 Git 的关键</span>，它帮助你理解数据的流向和各个命令的作用范围。</p>`

<h4>HEAD 的作用</h4>
<ul>
<li><strong>记录当前位置</strong>：告诉 Git 你当前工作在哪个分支</li>
<li><strong>作为基准</strong>：许多命令以 HEAD 为基准进行操作（如 git diff HEAD）</li>
<li><strong>支持历史导航</strong>：可以通过 HEAD~n 访问历史提交</li>
</ul>

<h4>HEAD 的表现形式</h4>
<ul>
<li><strong>指向分支</strong>：如 <code>main</code> 分支，HEAD 通常指向分支名，分支指向最新提交</li>
<li><strong>直接指向提交</strong>：处于"分离 HEAD"状态（detached HEAD），HEAD 直接指向某个提交而非分支</li>
</ul>

<h4>HEAD 的用法</h4>
<pre><code># 查看当前 HEAD 指向
git symbolic-ref HEAD
cat .git/HEAD

git rev-parse HEAD

# 查看 HEAD 的提交历史
git log -1

# 比较 HEAD 与其他提交
git diff HEAD~1 HEAD
git show HEAD

# 分离 HEAD（不推荐，除非你知道自己在做什么）
git checkout &lt;commit-hash&gt;
git checkout HEAD~3</code></pre>

<h4>分离 HEAD 的风险</h4>

<p>Git 是一个内容寻址文件系统（Content Addressable File System），核心是一个简单的键值对数据库。</p>

<h4>数据存储方式</h4>
<p>Git 不存储文件的差异，而是存储<strong>快照</strong>（Snapshots）：</p>
<ul>
<li>如果文件未修改，Git 只保留对之前相同文件的引用</li>
<li>如果文件有修改，Git 会创建一个新的 blob 对象</li>
</ul>

<h4>四种对象类型</h4>
<ol>
<li><strong>Blob</strong>（二进制大对象）：存储文件内容</li>
<li><strong>Tree</strong>：存储目录结构，指向 blob 和其他 tree</li>
<li><strong>Commit</strong>：指向 tree、parent commit、author、message</li>
<li><strong>Tag</strong>：给 commit 添加友好的名称</li>
</ol>

<h4>对象结构示意</h4>
<pre><code>提交对象 (Commit)
  ├── tree: 指向项目快照的 Tree 对象
  ├── parent: 指向父提交（第一个提交没有 parent）
  ├── author: 作者信息
  ├── committer: 提交者信息
  └── message: 提交信息

Tree 对象
  ├── 文件1 (blob)
  ├── 文件2 (blob)
  └── 子目录 (tree)</code></pre>

<h4>SHA-1 哈希</h4>
<p>Git 使用 SHA-1 哈希作为对象的唯一标识：</p>
<ul>
<li>内容相同 → 哈希值相同</li>
<li>内容微小变化 → 哈希值完全不同</li>
<li>可以检测数据完整性</li>
<li>哈希前 7 位通常足以唯一标识</li>
</ul>

<h4>.git 目录结构</h4>
<pre><code>.git/
├── HEAD            # 指向当前分支或提交
├── refs/           # 存储所有引用（分支、标签）
│   ├── heads/      # 本地分支
│   └── tags/       # 标签
├── objects/        # 所有数据对象
│   ├── info/       # 额外的对象存储
│   └── pack/       # 打包后的对象
├── index           # 暂存区信息
└── config          # 项目配置</code></pre>

<h4>Git 的三个区域</h4>
<p>工作目录 → 暂存区域 → Git 仓库</p>
<pre><code# 工作目录 → git add → 暂存区 → git commit → Git 仓库</code></pre>

<h4>关键命令的底层原理</h4>
<ul>
<li><strong>git add</strong>：计算文件内容的 SHA-1，存储为 blob，更新 index</li>
<li><strong>git commit</strong>：创建 tree 对象（当前 index）、commit 对象，更新 refs</li>
<li><strong>git checkout</strong>：根据 commit 恢复文件到工作区</li>
<li><strong>git branch</strong>：在 refs/heads 下创建一个指向当前 commit 的文件</li>
</ul>

<h4>分布式特性</h4>
<p>每个 clone 下来的仓库都是完整的，包括完整的提交历史。这就是为什么 Git 可以完全离线工作。</p>`

<p>Cherry-pick 是 Git 的一个命令，用于"挑选"一个或多个提交并将其应用到当前分支上。它会复制指定提交的更改，在当前分支创建新的提交。</p>

<h4>基本用法</h4>
<pre><code># 挑选单个提交

git cherry-pick commit1 commit2 commit3

git cherry-pick commit1..commit3
# 注意：这不包含 commit1，会包含 commit2, commit3

# 包含 commit1
git cherry-pick commit1^..commit3</code></pre>

<h4>使用场景</h4>
<ul>
<li><strong>紧急修复</strong>：在 release 分支上修复 bug，需要同步到 main 分支</li>
<li><strong>选择性地合并</strong>：只需要某个分支的部分提交</li>
<li><strong>恢复误删的提交</strong>：从其他分支恢复某个特定更改</li>
<li><strong>A/B 测试</strong>：在不同分支测试不同功能</li>
</ul>

<h4>处理合并冲突</h4>
<p>Cherry-pick 过程中可能出现冲突：</p>
<pre><code># 1. 如果有冲突，解决后
git add &lt;resolved-files&gt;

# 2. 继续 cherry-pick
git cherry-pick --continue

# 或者放弃这次 cherry-pick
git cherry-pick --abort</code></pre>

<h4>选项</h4>
<pre><code># 不要创建新提交，只将更改应用到暂存区
git cherry-pick -n &lt;commit&gt;
git cherry-pick --no-commit &lt;commit&gt;

# 编辑提交信息
git cherry-pick -e &lt;commit&gt;

# 追加签名
git cherry-pick -x &lt;commit&gt;  # 添加 (cherry picked from commit ...) 到消息

# 停止工作区干净时不执行
git cherry-pick --no-commit</code></pre>

<h4>示例场景</h4>
<p>假设你在 feature 分支上开发，突然需要在 main 分支上修复一个紧急 bug：</p>
<pre><code># 1. 切换到 main 分支

# 2. Cherry-pick bugfix 提交

# 3. 推送到远程

<li>原始提交依然存在于原分支</li>
<li>可能导致重复应用某些更改</li>
<li>保持清晰的提交历史很重要</li>
</ul>`

<h4>分支类型</h4>
<ul>
<li><strong>main/master</strong>：生产环境代码，只接受合并，不直接提交</li>
<li><strong>develop</strong>：开发主分支，集成所有功能分支</li>
<li><strong>feature/*</strong>：功能分支，从 develop 创建</li>
<li><strong>release/*</strong>：发布分支，从 develop 创建</li>
<li><strong>hotfix/*</strong>：紧急修复分支，从 main 创建</li>
</ul>

<h4>工作流程</h4>
<pre><code>main ─────●─────●─────●─────●──
            │     │     │     ↑

<h4>适用场景</h4>
<ul>
<li><strong>适合</strong>：有明确版本发布周期的项目、需要并行开发的多个功能、团队协作的大型项目</li>
<li><strong>不适合</strong>：小团队或单人项目、持续部署的敏捷项目、简单的 MVP 开发</li>
</ul>

<h4>常用命令</h4>
<pre><code># 安装 Git Flow 工具（可选）

# Ubuntu: apt-get install git-flow

# 初始化

# 功能开发
git flow feature start my-feature
git flow feature finish my-feature

# 发布
git flow release start 1.0.0
git flow release finish 1.0.0

# 紧急修复
git flow hotfix start fix-name
git flow hotfix finish fix-name</code></pre>

<h4>Git Flow 的优缺点</h4>
<table>
<tr><th>优点</th><th>缺点</th></tr>

<tr><td>适合大型团队</td><td>发布周期长</td></tr>

<h4>现代替代方案</h4>

                            <div class="answer-content">
                                <div class="answer-text">${q.answer}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 渲染题目列表（单一分类）
        function renderQuestionsList(questionsList, container) {
            if (questionsList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <p>没有找到匹配的题目</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = renderQuestionsListHTML(questionsList);
        }

        // 展开/收起答案
        function toggleQuestion(id) {
            const card = document.querySelector(`.question-card[data-id="${id}"]`);
            card.classList.toggle('expanded');
        }

        // 收藏功能
        function toggleFavorite(id) {
            const index = favorites.indexOf(id);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('git-interview-favorites', JSON.stringify(favorites));
            renderQuestions();
            updateCounts();
        }

        // 更新计数
        function updateCounts() {
            const categoryCounts = {
                all: questions.length,
                basic: questions.filter(q => q.category === 'basic').length,
                branch: questions.filter(q => q.category === 'branch').length,
                undo: questions.filter(q => q.category === 'undo').length,
                advanced: questions.filter(q => q.category === 'advanced').length,
                favorites: favorites.length
            };

            const difficultyCounts = {
                easy: questions.filter(q => q.difficulty === 'easy').length,
                medium: questions.filter(q => q.difficulty === 'medium').length,
                hard: questions.filter(q => q.difficulty === 'hard').length
            };

            for (const [key, count] of Object.entries(categoryCounts)) {
                const el = document.getElementById(key === 'all' ? 'totalCount' : `${key}Count`);
                if (el) el.textContent = count;
            }

            document.getElementById('easyCount').textContent = difficultyCounts.easy;
            document.getElementById('mediumCount').textContent = difficultyCounts.medium;
            document.getElementById('hardCount').textContent = difficultyCounts.hard;
        }

        // 设置事件监听
        function setupEventListeners() {
            // 导航点击
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    const category = item.dataset.category;

                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');

                    currentCategory = category;
                    renderQuestions();
                    updateCounts();

                    // 移动端关闭侧边栏
                    if (window.innerWidth <= 900) {
                        document.getElementById('sidebar').classList.remove('open');
                        document.getElementById('sidebarOverlay').classList.remove('show');
                    }
                });
            });

            // 搜索
            document.getElementById('searchInput').addEventListener('input', () => {
                renderQuestions();
            });

            // 随机练习模式
            document.getElementById('practiceModeBtn').addEventListener('click', startPractice);

            // 关闭练习模式
            document.getElementById('closePractice').addEventListener('click', closePractice);

            // 显示答案
            document.getElementById('showAnswerBtn').addEventListener('click', () => {
                document.getElementById('practiceAnswer').classList.add('show');
                practiceShown = true;
            });

            // 下一题
            document.getElementById('nextQuestionBtn').addEventListener('click', () => {
                document.getElementById('practiceAnswer').classList.remove('show');
                practiceShown = false;
                nextPracticeQuestion();
            });

            // 收藏
            document.getElementById('practiceFavoriteBtn').addEventListener('click', () => {
                if (practiceQuestions.length > 0) {
                    const q = practiceQuestions[currentPracticeIndex];
                    toggleFavorite(q.id);
                }
            });

            // 移动端菜单
            document.getElementById('mobileMenuBtn').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('open');
                document.getElementById('sidebarOverlay').classList.toggle('show');
            });

            document.getElementById('sidebarOverlay').addEventListener('click', () => {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('show');
            });
        }

        // 开始随机练习
        function startPractice() {
            // 从所有题目或当前分类中随机选择
            let pool = questions;
            if (currentCategory !== 'all' && currentCategory !== 'favorites') {
                pool = questions.filter(q => q.category === currentCategory);
            } else if (currentCategory === 'favorites') {
                pool = questions.filter(q => favorites.includes(q.id));
            }

            if (pool.length === 0) {
                alert('没有可用的题目');
                return;
            }

            // 随机打乱
            practiceQuestions = [...pool].sort(() => Math.random() - 0.5);
            currentPracticeIndex = 0;
            practiceShown = false;

            document.getElementById('practiceMode').classList.add('active');
            document.body.style.overflow = 'hidden';

            showPracticeQuestion();
        }

        // 显示当前练习题目
        function showPracticeQuestion() {
            const q = practiceQuestions[currentPracticeIndex];
            const difficultyLabels = { easy: '简单', medium: '中等', hard: '困难' };
            const categoryLabels = { basic: '基础概念', branch: '分支操作', undo: '撤销操作', advanced: '进阶问题' };

            document.getElementById('practiceQuestionText').textContent = q.question;
            document.getElementById('practiceDifficulty').textContent = difficultyLabels[q.difficulty];
            document.getElementById('practiceDifficulty').className = `difficulty-tag ${q.difficulty}`;
            document.getElementById('practiceCategory').textContent = categoryLabels[q.category];
            document.getElementById('practiceAnswerText').innerHTML = q.answer;
            document.getElementById('practiceAnswer').classList.remove('show');

            document.getElementById('practiceStats').textContent =
                `题目 ${currentPracticeIndex + 1} / ${practiceQuestions.length} · 已收藏: ${favorites.includes(q.id) ? '是' : '否'}`;

            // 更新收藏按钮状态
            const favBtn = document.getElementById('practiceFavoriteBtn');
            favBtn.classList.toggle('active', favorites.includes(q.id));
        }

        // 下一题
        function nextPracticeQuestion() {
            currentPracticeIndex = (currentPracticeIndex + 1) % practiceQuestions.length;
            showPracticeQuestion();
        }

        // 关闭练习模式
        function closePractice() {
            document.getElementById('practiceMode').classList.remove('active');
            document.body.style.overflow = '';
        }

        // 暴露函数到全局
        window.toggleQuestion = toggleQuestion;
        window.toggleFavorite = toggleFavorite;
    </script>
</body>
</html>
