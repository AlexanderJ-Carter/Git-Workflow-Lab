<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实战项目 - Git Workflow Lab</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --project-primary: #6366f1;
            --project-secondary: #8b5cf6;
            --project-success: #10b981;
            --project-warning: #f59e0b;
            --project-error: #ef4444;
            --project-bg: #f8fafc;
            --project-bg-card: #ffffff;
            --project-border: #e2e8f0;
            --project-text: #1e293b;
            --project-text-muted: #64748b;
            --project-radius: 16px;
            --project-radius-sm: 8px;
        }

        [data-theme="dark"] {
            --project-bg: #0f172a;
            --project-bg-card: #1e293b;
            --project-border: #334155;
            --project-text: #f1f5f9;
            --project-text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            background: var(--project-bg);
            color: var(--project-text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 页面头部 */
        .project-header {
            background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 100%);
            padding: 48px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        [data-theme="dark"] .project-header {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
        }

        .project-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%236366f1' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }

        .project-header-content {
            position: relative;
            z-index: 1;
        }

        .project-header h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--project-primary), var(--project-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .project-header p {
            color: var(--project-text-muted);
            font-size: 18px;
            max-width: 700px;
            margin: 0 auto 24px;
        }

        /* 进度总览 */
        .project-progress-card {
            max-width: 900px;
            margin: -24px auto 40px;
            padding: 24px 32px;
            background: var(--project-bg-card);
            border: 1px solid var(--project-border);
            border-radius: var(--project-radius);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
        }

        .project-progress-info {
            flex: 1;
            min-width: 200px;
        }

        .project-progress-label {
            font-size: 14px;
            color: var(--project-text-muted);
            margin-bottom: 4px;
        }

        .project-progress-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--project-primary);
        }

        .project-progress-stats {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .project-stat-item {
            text-align: center;
        }

        .project-stat-number {
            font-size: 24px;
            font-weight: 700;
            color: var(--project-text);
        }

        .project-stat-label {
            font-size: 12px;
            color: var(--project-text-muted);
        }

        /* 筛选区域 */
        .filter-section {
            max-width: 900px;
            margin: 0 auto 32px;
            padding: 20px 24px;
            background: var(--project-bg-card);
            border: 1px solid var(--project-border);
            border-radius: var(--project-radius);
        }

        .filter-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--project-text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--project-border);
            background: var(--project-bg-card);
            color: var(--project-text-muted);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            border-color: var(--project-primary);
            color: var(--project-primary);
        }

        .filter-btn.active {
            background: var(--project-primary);
            border-color: var(--project-primary);
            color: white;
        }

        .filter-reset {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            background: transparent;
            color: var(--project-text-muted);
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
        }

        .filter-reset:hover {
            color: var(--project-text);
        }

        /* 项目网格 */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .project-card {
            background: var(--project-bg-card);
            border: 1px solid var(--project-border);
            border-radius: var(--project-radius);
            padding: 28px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--project-primary), var(--project-secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.15);
            border-color: var(--project-primary);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-card.completed::before {
            opacity: 1;
            background: var(--project-success);
        }

        .project-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .project-number {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: white;
        }

        .project-number.p1 { background: linear-gradient(135deg, #10b981, #059669); }
        .project-number.p2 { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .project-number.p3 { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .project-number.p4 { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }

        .project-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .project-badge.beginner {
            background: #d1fae5;
            color: #065f46;
        }

        .project-badge.intermediate {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .project-badge.advanced {
            background: #fce7f3;
            color: #9d174d;
        }

        [data-theme="dark"] .project-badge.beginner {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        [data-theme="dark"] .project-badge.intermediate {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        [data-theme="dark"] .project-badge.advanced {
            background: rgba(236, 72, 153, 0.2);
            color: #f472b6;
        }

        .project-card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--project-text);
        }

        .project-card-desc {
            font-size: 14px;
            color: var(--project-text-muted);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .project-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .skill-tag {
            padding: 4px 10px;
            background: var(--project-bg);
            border-radius: 6px;
            font-size: 12px;
            color: var(--project-text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .project-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--project-border);
        }

        .project-time {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--project-text-muted);
        }

        .project-time svg {
            width: 16px;
            height: 16px;
        }

        .project-xp {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 600;
            color: var(--project-primary);
        }

        .project-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--project-success);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card.completed .project-check {
            opacity: 1;
        }

        /* 空状态 */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--project-text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--project-text);
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--project-bg-card);
            border-radius: var(--project-radius);
            max-width: 800px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-header {
            padding: 24px 28px;
            border-bottom: 1px solid var(--project-border);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            position: sticky;
            top: 0;
            background: var(--project-bg-card);
            z-index: 1;
        }

        .modal-title-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .modal-number {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: white;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--project-text);
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: var(--project-bg);
            color: var(--project-text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .modal-close:hover {
            background: var(--project-border);
            color: var(--project-text);
        }

        .modal-body {
            padding: 28px;
        }

        .modal-section {
            margin-bottom: 28px;
        }

        .modal-section:last-child {
            margin-bottom: 0;
        }

        .modal-section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--project-text);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-section-title svg {
            width: 20px;
            height: 20px;
            color: var(--project-primary);
        }

        .modal-section p {
            color: var(--project-text-muted);
            font-size: 15px;
            line-height: 1.7;
        }

        .modal-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .modal-skill {
            padding: 6px 14px;
            background: var(--project-bg);
            border-radius: 8px;
            font-size: 13px;
            color: var(--project-text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* 步骤列表 */
        .steps-list {
            list-style: none;
        }

        .step-item {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: var(--project-bg);
            border-radius: var(--project-radius-sm);
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        .step-item:hover {
            background: var(--project-border);
        }

        .step-checkbox {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 2px solid var(--project-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .step-checkbox:hover {
            border-color: var(--project-primary);
        }

        .step-checkbox.checked {
            background: var(--project-success);
            border-color: var(--project-success);
            color: white;
        }

        .step-checkbox svg {
            width: 14px;
            height: 14px;
            opacity: 0;
        }

        .step-checkbox.checked svg {
            opacity: 1;
        }

        .step-content {
            flex: 1;
        }

        .step-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--project-text);
            margin-bottom: 4px;
        }

        .step-desc {
            font-size: 13px;
            color: var(--project-text-muted);
            line-height: 1.6;
        }

        .step-code {
            margin-top: 8px;
            padding: 10px 14px;
            background: var(--project-text);
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #e2e8f0;
            overflow-x: auto;
        }

        /* 检查清单 */
        .checklist {
            list-style: none;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--project-border);
            font-size: 14px;
            color: var(--project-text-muted);
        }

        .checklist-item:last-child {
            border-bottom: none;
        }

        .checklist-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--project-border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .checklist-item.checked .checklist-icon {
            background: var(--project-success);
            border-color: var(--project-success);
            color: white;
        }

        /* 模态框底部 */
        .modal-footer {
            padding: 20px 28px;
            border-top: 1px solid var(--project-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--project-bg-card);
            position: sticky;
            bottom: 0;
        }

        .modal-meta {
            display: flex;
            gap: 24px;
        }

        .modal-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--project-text-muted);
        }

        .modal-complete-btn {
            padding: 10px 24px;
            border-radius: 10px;
            border: none;
            background: var(--project-primary);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-complete-btn:hover {
            background: var(--project-secondary);
            transform: translateY(-2px);
        }

        .modal-complete-btn.completed {
            background: var(--project-success);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .project-header {
                padding: 32px 16px;
            }

            .project-header h1 {
                font-size: 28px;
            }

            .project-header p {
                font-size: 15px;
            }

            .project-progress-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
                padding: 20px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .filter-section {
                padding: 16px;
            }

            .modal-header {
                padding: 20px;
            }

            .modal-body {
                padding: 20px;
            }

            .modal-footer {
                flex-direction: column;
                gap: 16px;
            }

            .modal-meta {
                width: 100%;
                justify-content: space-between;
            }

            .modal-complete-btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .project-card {
            animation: fadeInUp 0.5s ease backwards;
        }

        .project-card:nth-child(1) { animation-delay: 0.1s; }
        .project-card:nth-child(2) { animation-delay: 0.2s; }
        .project-card:nth-child(3) { animation-delay: 0.3s; }
        .project-card:nth-child(4) { animation-delay: 0.4s; }

        /* 页脚 */
        footer {
            margin-top: auto;
            padding: 32px 24px;
            text-align: center;
            color: var(--project-text-muted);
            font-size: 14px;
            background: var(--project-bg-card);
            border-top: 1px solid var(--project-border);
        }

        footer a {
            color: var(--project-primary);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header class="project-header">
        <div class="project-header-content container">
            <h1>实战项目</h1>
            <p>通过完整的实战项目，综合运用多个 Git 技能，从入门到高级逐步提升你的版本控制能力</p>
        </div>
    </header>

    <div class="container">
        <!-- 进度总览 -->
        <div class="project-progress-card">
            <div class="project-progress-info">
                <div class="project-progress-label">项目进度</div>
                <div class="project-progress-value"><span id="completedCount">0</span> / <span id="totalCount">4</span></div>
            </div>
            <div class="project-progress-stats">
                <div class="project-stat-item">
                    <div class="project-stat-number" id="completedXp">0</div>
                    <div class="project-stat-label">已获得经验</div>
                </div>
                <div class="project-stat-item">
                    <div class="project-stat-number" id="totalXp">450</div>
                    <div class="project-stat-label">总可获经验</div>
                </div>
            </div>
        </div>

        <!-- 筛选区域 -->
        <div class="filter-section">
            <div class="filter-title">按难度筛选</div>
            <div class="filter-group" id="difficultyFilters">
                <button class="filter-btn active" data-difficulty="all">全部</button>
                <button class="filter-btn" data-difficulty="beginner">入门</button>
                <button class="filter-btn" data-difficulty="intermediate">进阶</button>
                <button class="filter-btn" data-difficulty="advanced">高级</button>
            </div>
            <div class="filter-title" style="margin-top: 16px;">按时间筛选</div>
            <div class="filter-group" id="timeFilters">
                <button class="filter-btn active" data-time="all">全部</button>
                <button class="filter-btn" data-time="short">1-2 小时</button>
                <button class="filter-btn" data-time="medium">2-3 小时</button>
                <button class="filter-btn" data-time="long">3-4 小时</button>
            </div>
        </div>

        <!-- 项目网格 -->
        <div class="projects-grid" id="projectsGrid">
            <!-- 项目卡片将由 JavaScript 动态生成 -->
        </div>
    </div>

    <!-- 项目详情模态框 -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title-group">
                    <div class="modal-number" id="modalNumber">1</div>
                    <div>
                        <h2 class="modal-title" id="modalTitle">项目名称</h2>
                    </div>
                </div>
                <button class="modal-close" id="modalClose">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <!-- 项目简介 -->

        // 状态管理
        let currentDifficulty = 'all';
        let currentTime = 'all';
        let currentProject = null;
        let projectProgress = {};

        // 加载进度
        function loadProgress() {
            try {
                const saved = localStorage.getItem('git-workflow-projects');
                projectProgress = saved ? JSON.parse(saved) : {};
            } catch (e) {
                projectProgress = {};
            }
            updateProgressDisplay();
        }

        // 保存进度
        function saveProgress() {
            try {
                localStorage.setItem('git-workflow-projects', JSON.stringify(projectProgress));
            } catch (e) {
                console.warn('无法保存进度');
            }
        }

        // 更新进度显示
        function updateProgressDisplay() {
            const completed = projects.filter(p => projectProgress[p.id]?.completed).length;
            const totalXp = projects.reduce((sum, p) => sum + (projectProgress[p.id]?.completed ? p.xp : 0), 0);

            document.getElementById('completedCount').textContent = completed;
            document.getElementById('completedXp').textContent = totalXp;
        }

        // 渲染项目卡片
        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = '';

            const filtered = projects.filter(p => {
                const diffMatch = currentDifficulty === 'all' || p.difficulty === currentDifficulty;
                const timeMatch = currentTime === 'all' || p.time === currentTime;
                return diffMatch && timeMatch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="M21 21l-4.35-4.35"></path>
                        </svg>
                        <h3>没有匹配的项目</h3>
                        <p>尝试调整筛选条件查看更多项目</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(project => {
                const isCompleted = projectProgress[project.id]?.completed;
                const card = document.createElement('div');
                card.className = `project-card ${isCompleted ? 'completed' : ''}`;
                card.dataset.projectId = project.id;

                card.innerHTML = `
                    <div class="project-card-header">
                        <div class="project-number p${project.number}">${project.number}</div>
                        <span class="project-badge ${project.difficulty}">${project.difficultyLabel}</span>
                    </div>
                    <h3 class="project-card-title">${project.title}</h3>
                    <p class="project-card-desc">${project.desc}</p>
                    <div class="project-skills">
                        ${project.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
                    </div>
                    <div class="project-meta">
                        <div class="project-time">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                            ${project.timeLabel}
                        </div>
                        <div class="project-xp">${project.xp} XP</div>
                        <div class="project-check">&#10003;</div>
                    </div>
                `;

                card.addEventListener('click', () => openModal(project));
                grid.appendChild(card);
            });
        }

        // 打开模态框
        function openModal(project) {
            currentProject = project;

            document.getElementById('modalNumber').className = `modal-number p${project.number}`;
            document.getElementById('modalNumber').textContent = project.number;
            document.getElementById('modalTitle').textContent = project.title;
            document.getElementById('modalDesc').textContent = project.desc;
            document.getElementById('modalTime').textContent = project.timeLabel;
            document.getElementById('modalXp').textContent = `${project.xp} XP`;

            // 技能标签
            document.getElementById('modalSkills').innerHTML = project.skills
                .map(s => `<span class="modal-skill">${s}</span>`)
                .join('');

            // 步骤列表
            const stepsHtml = project.steps.map((step, index) => `
                <li class="step-item">
                    <div class="step-checkbox" data-step="${index}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <div class="step-content">
                        <div class="step-title">${index + 1}. ${step.title}</div>
                        <div class="step-desc">${step.desc}</div>
                        <pre class="step-code">${step.code}</pre>
                    </div>
                </li>
            `).join('');
            document.getElementById('modalSteps').innerHTML = stepsHtml;

            // 检查清单
            const checklistHtml = project.checklist.map((item, index) => {
                const isChecked = projectProgress[project.id]?.checklist?.[index];
                return `
                    <li class="checklist-item ${isChecked ? 'checked' : ''}" data-check="${index}">
                        <div class="checklist-icon">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </div>
                        ${item}
                    </li>
                `;
            }).join('');
            document.getElementById('modalChecklist').innerHTML = checklistHtml;

            // 完成按钮状态
            const isProjectCompleted = projectProgress[project.id]?.completed;
            const completeBtn = document.getElementById('completeBtn');
            if (isProjectCompleted) {
                completeBtn.classList.add('completed');
                completeBtn.innerHTML = `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <span>已完成</span>
                `;
            } else {
                completeBtn.classList.remove('completed');
                completeBtn.innerHTML = `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <span>标记完成</span>
                `;
            }

            // 绑定步骤复选框事件
            document.querySelectorAll('.step-checkbox').forEach(checkbox => {
                checkbox.addEventListener('click', (e) => {
                    e.stopPropagation();
                    checkbox.classList.toggle('checked');
                });
            });

            // 绑定检查清单事件
            document.querySelectorAll('.checklist-item').forEach(item => {
                item.addEventListener('click', () => {
                    const index = parseInt(item.dataset.check);
                    if (!projectProgress[project.id]) {
                        projectProgress[project.id] = { completed: false, checklist: {} };
                    }
                    if (!projectProgress[project.id].checklist) {
                        projectProgress[project.id].checklist = {};
                    }
                    projectProgress[project.id].checklist[index] = !projectProgress[project.id].checklist[index];
                    item.classList.toggle('checked', projectProgress[project.id].checklist[index]);
                    saveProgress();
                });
            });

            document.getElementById('projectModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('projectModal').classList.remove('active');
            document.body.style.overflow = '';
            currentProject = null;
        }

        // 初始化筛选功能
        function initFilters() {
            // 难度筛选
            document.querySelectorAll('#difficultyFilters .filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#difficultyFilters .filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentDifficulty = btn.dataset.difficulty;
                    renderProjects();
                });
            });

            // 时间筛选
            document.querySelectorAll('#timeFilters .filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#timeFilters .filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTime = btn.dataset.time;
                    renderProjects();
                });
            });
        }

        // 初始化完成按钮
        function initCompleteBtn() {
            document.getElementById('completeBtn').addEventListener('click', () => {
                if (!currentProject) return;

                const isCompleted = projectProgress[currentProject.id]?.completed;
                projectProgress[currentProject.id] = {
                    completed: !isCompleted,
                    checklist: projectProgress[currentProject.id]?.checklist || {}
                };

                saveProgress();
                updateProgressDisplay();

                const btn = document.getElementById('completeBtn');
                if (!isCompleted) {
                    btn.classList.add('completed');
                    btn.innerHTML = `
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        <span>已完成</span>
                    `;
                } else {
                    btn.classList.remove('completed');
                    btn.innerHTML = `
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        <span>标记完成</span>
                    `;
                }

                renderProjects();
            });
        }

        // 初始化模态框关闭
        function initModalClose() {
            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('projectModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('projectModal')) {
                    closeModal();
                }
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });
        }

        // 页面初始化
        function init() {
            loadProgress();
            renderProjects();
            initFilters();
            initCompleteBtn();
            initModalClose();
        }

        // 启动
        init();
    </script>
</body>
</html>
